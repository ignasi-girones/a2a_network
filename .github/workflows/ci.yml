name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-test:
    name: Lint & Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .
        continue-on-error: true  # Advisory during initial CI rollout

      - name: Pytest (unit + e2e)
        env:
          # Dummy keys so litellm / pydantic-settings don't complain at import.
          GROQ_API_KEY: "test-dummy"
          GEMINI_API_KEY: "test-dummy"
          MISTRAL_API_KEY: "test-dummy"
          CEREBRAS_API_KEY: "test-dummy"
        run: pytest tests/ -v --tb=short

  docker-build:
    name: Docker build sanity check
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: a2a-network:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-test the image
        run: |
          # Confirm every agent module imports cleanly inside the built image.
          docker run --rm \
            -e GROQ_API_KEY=x -e GEMINI_API_KEY=x \
            -e MISTRAL_API_KEY=x -e CEREBRAS_API_KEY=x \
            a2a-network:ci python -c "
          import agents.orchestrator.agent_registry
          import agents.orchestrator.planner
          import agents.orchestrator.plan_executor
          import agents.orchestrator.worker_spawner
          import agents.orchestrator.agentic_orchestrator
          import agents.orchestrator.executor
          import agents.normalizer.executor
          import agents.specialized.executor
          import agents.feedback.executor
          import agents.mcp_tools.server
          print('OK: all modules import cleanly')
          "
